services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"

    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - php

    networks:
      - app-network

  php:
    build: ./php

    volumes:
      - ./:/var/www/html

    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: root
      DB_NAME: mini_ecommerce

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - app-network

  mysql:
    image: mysql:8

    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mini_ecommerce

    volumes:
      - ./mysql:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
